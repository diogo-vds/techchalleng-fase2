spring:
  application:
    name: restaurante

  datasource:
    url: jdbc:postgresql://localhost:5432/restaurante_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
