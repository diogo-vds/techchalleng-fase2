spring:
  application:
    name: restaurante

#  datasource:
#    url: jdbc:postgresql://localhost:5432/restaurante_db
#    username: postgres
#    password: postgres
#    driver-class-name: org.postgresql.Driver
  datasource:
    url: jdbc:h2:mem:testeJavaRest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
